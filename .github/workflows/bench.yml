name: Fib Benchmark

on:
  push:
    branches:
      - main
      - docs-actions
  workflow_dispatch:

jobs:
  bench:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}

    name: bench (${{ matrix.os }})

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1
          use-cache: false

      - name: Print platform info
        run: |
          echo "runner.os=${{ runner.os }}"
          echo "runner.arch=${{ runner.arch }}"
          uname -a
          lscpu || true
          cat /etc/os-release || true

      - name: Build and run fib bench (all encodings)
        run: zig build bench -Dencoding=ptr -Doptimize=ReleaseSafe --summary all
        working-directory: zig

