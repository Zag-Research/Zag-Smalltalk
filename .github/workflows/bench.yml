name: Fib Benchmark

on:
  push:
    branches:
      - main
      - docs-actions
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    name: Cross-compile benchmarks

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Build benchmarks for x86_64
        run: zig build bench-build -Doptimize=ReleaseFast -Dtarget=x86_64-linux --summary all
        working-directory: zig

      - name: Build benchmarks for aarch64
        run: zig build bench-build -Doptimize=ReleaseFast -Dtarget=aarch64-linux --summary all
        working-directory: zig

      - name: Upload x86_64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bench-x86_64
          path: zig/zig-out/x86_64/

      - name: Upload aarch64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bench-aarch64
          path: zig/zig-out/aarch64/

  run-x86:
    needs: build
    runs-on: ubuntu-latest
    name: Run benchmarks (x86_64)

    steps:
      - uses: actions/checkout@v4

      - name: Download x86_64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: bench-x86_64
          path: bench/

      - name: Run all benchmarks
        run: |
          out="bench/bench-results.txt"
          : > "$out"
          find bench -name 'fib-*' -type f -print0 | while IFS= read -r -d '' bin; do
            chmod +x "$bin"
            "$bin" 2>&1 | tee -a "$out" || true
          done

      - name: Generate LaTeX table
        run: |
          echo "### LaTeX Table (x86_64)" >> "$GITHUB_STEP_SUMMARY"
          echo '```tex' >> "$GITHUB_STEP_SUMMARY"
          python3 zig/experiments/latex-table.py bench/bench-results.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload x86_64 benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: bench-results-x86_64
          path: bench/bench-results.txt

  run-arm:
    needs: build
    runs-on: ubuntu-24.04-arm
    name: Run benchmarks (aarch64)

    steps:
      - uses: actions/checkout@v4

      - name: Download aarch64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: bench-aarch64
          path: bench/

      - name: Run all benchmarks
        run: |
          out="bench/bench-results.txt"
          : > "$out"
          find bench -name 'fib-*' -type f -print0 | while IFS= read -r -d '' bin; do
            chmod +x "$bin"
            "$bin" 2>&1 | tee -a "$out" || true
          done

      - name: Generate LaTeX table
        run: |
          echo "### LaTeX Table (aarch64)" >> "$GITHUB_STEP_SUMMARY"
          echo '```tex' >> "$GITHUB_STEP_SUMMARY"
          python3 zig/experiments/latex-table.py bench/bench-results.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload aarch64 benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: bench-results-aarch64
          path: bench/bench-results.txt

  pareto:
    needs:
      - run-x86
      - run-arm
    runs-on: ubuntu-latest
    name: Generate Pareto Scatter Plot

    steps:
      - uses: actions/checkout@v4

      - name: Download x86_64 results
        uses: actions/download-artifact@v4
        with:
          name: bench-results-x86_64
          path: bench/x86

      - name: Download aarch64 results
        uses: actions/download-artifact@v4
        with:
          name: bench-results-aarch64
          path: bench/aarch

      - name: Generate Pareto LaTeX plot
        run: |
          echo "### Pareto Scatter Plot" >> "$GITHUB_STEP_SUMMARY"
          echo '```tex' >> "$GITHUB_STEP_SUMMARY"
          python3 zig/experiments/latex-table.py bench/x86/bench-results.txt bench/aarch/bench-results.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
