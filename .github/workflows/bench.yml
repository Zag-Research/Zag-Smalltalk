name: Fib Benchmark

on:
  push:
    branches:
      - main
      - docs-actions
  workflow_dispatch:

jobs:
  bench:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}

    name: bench (${{ matrix.os }})

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
          use-cache: false

      - name: Print platform info
        run: |
          echo "runner.os=${{ runner.os }}"
          echo "runner.arch=${{ runner.arch }}"
          uname -a
          lscpu || true
          cat /etc/os-release || true

      - name: Emit LLVM IR (ptr fib)
        run: |
          zig build emit-fib-ir -Dencoding=ptr -Doptimize=ReleaseFast -Dtarget=x86_64-linux-gnu -Dcpu=baseline --summary all
          ls -lah zig-out/llvm-ir || true
        working-directory: zig

      - name: Upload LLVM IR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: llvm-ir-${{ matrix.os }}
          path: zig/zig-out/llvm-ir/
          if-no-files-found: warn
